<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banner Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f5;
      font-family: 'Figtree', sans-serif;
      color: #111;
      padding: 32px 24px;
    }

    .container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 15px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    /* APP BLOCK */
    .app-block {
      background: #fff;
      border-radius: 18px;
      padding: 28px 28px 24px;
      margin-bottom: 20px;
    }

    .app-name {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-name .icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .app1 .icon { background: #eef4ff; }
    .app2 .icon { background: #fff4ec; }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      border: 1.5px solid #efefef;
      border-radius: 12px;
      padding: 18px 16px 16px;
    }

    .card-label {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      color: #111;
      line-height: 1;
    }

    .card.ctr .card-value { color: #2563eb; }

    /* BARS */
    .bar-block { margin-bottom: 9px; }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      margin-bottom: 5px;
    }

    .bar-meta span:last-child { font-weight: 600; color: #111; }

    .bar-track {
      height: 8px;
      background: #f0f0f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill { height: 100%; border-radius: 99px; }
    .bar-fill.shows  { background: #111; }
    .bar-fill.clicks { background: #2563eb; }

    .updated {
      font-size: 12px;
      color: #ccc;
      margin-top: 16px;
    }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
      .app-block { padding: 20px 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-title">Banner Analytics</div>

  <!-- ======================================
       ✏️  APP 1 — CHANGE VALUES HERE
  ======================================= -->
  <script>
    const APP1 = {
      name:        "Muslim UZ: Qur'on Azon Namoz",
      icon:        "🕌",
      shows:       18500,
      clicks:      1240,
      lastUpdated: "16 Mar 2025"
    };

    const APP2 = {
      name:        "Yo'l harakati qoidalari 2026",
      icon:        "🚗",
      shows:       9300,
      clicks:      610,
      lastUpdated: "16 Mar 2025"
    };
  </script>
  <!-- ====================================== -->

  <!-- APP 1 -->
  <div class="app-block app1">
    <div class="app-name">
      <div class="icon" id="icon1"></div>
      <span id="name1"></span>
    </div>
    <div class="cards">
      <div class="card">
        <div class="card-label">Shows</div>
        <div class="card-value" id="a1-shows">—</div>
      </div>
      <div class="card">
        <div class="card-label">Clicks</div>
        <div class="card-value" id="a1-clicks">—</div>
      </div>
      <div class="card ctr">
        <div class="card-label">CTR</div>
        <div class="card-value" id="a1-ctr">—</div>
      </div>
    </div>
    <div class="bar-block">
      <div class="bar-meta"><span>Shows</span><span id="a1-sb"></span></div>
      <div class="bar-track"><div class="bar-fill shows" style="width:100%"></div></div>
    </div>
    <div class="bar-block">
      <div class="bar-meta"><span>Clicks</span><span id="a1-cb"></span></div>
      <div class="bar-track"><div class="bar-fill clicks" id="a1-fill"></div></div>
    </div>
    <div class="updated" id="a1-date"></div>
  </div>

  <!-- APP 2 -->
  <div class="app-block app2">
    <div class="app-name">
      <div class="icon" id="icon2"></div>
      <span id="name2"></span>
    </div>
    <div class="cards">
      <div class="card">
        <div class="card-label">Shows</div>
        <div class="card-value" id="a2-shows">—</div>
      </div>
      <div class="card">
        <div class="card-label">Clicks</div>
        <div class="card-value" id="a2-clicks">—</div>
      </div>
      <div class="card ctr">
        <div class="card-label">CTR</div>
        <div class="card-value" id="a2-ctr">—</div>
      </div>
    </div>
    <div class="bar-block">
      <div class="bar-meta"><span>Shows</span><span id="a2-sb"></span></div>
      <div class="bar-track"><div class="bar-fill shows" style="width:100%"></div></div>
    </div>
    <div class="bar-block">
      <div class="bar-meta"><span>Clicks</span><span id="a2-cb"></span></div>
      <div class="bar-track"><div class="bar-fill clicks" id="a2-fill"></div></div>
    </div>
    <div class="updated" id="a2-date"></div>
  </div>

</div>

<script>
  function render(app, prefix) {
    const ctr = app.shows > 0 ? ((app.clicks / app.shows) * 100).toFixed(1) + "%" : "N/A";
    const pct = app.shows > 0 ? (app.clicks / app.shows) * 100 : 0;

    document.getElementById("icon"    + prefix).textContent = app.icon;
    document.getElementById("name"    + prefix).textContent = app.name;
    document.getElementById("a" + prefix + "-shows").textContent  = app.shows.toLocaleString();
    document.getElementById("a" + prefix + "-clicks").textContent = app.clicks.toLocaleString();
    document.getElementById("a" + prefix + "-ctr").textContent    = ctr;
    document.getElementById("a" + prefix + "-sb").textContent     = app.shows.toLocaleString();
    document.getElementById("a" + prefix + "-cb").textContent     = app.clicks.toLocaleString();
    document.getElementById("a" + prefix + "-fill").style.width   = pct + "%";
    document.getElementById("a" + prefix + "-date").textContent   = "Last updated: " + app.lastUpdated;
  }

  render(APP1, "1");
  render(APP2, "2");
</script>
</body>
</html>
