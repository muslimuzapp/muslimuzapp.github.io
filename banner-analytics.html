<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banner Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f5;
      font-family: 'Figtree', sans-serif;
      color: #111;
      padding: 32px 24px;
    }

    .container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 15px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    /* APP BLOCK */
    .app-block {
      background: #fff;
      border-radius: 18px;
      padding: 28px 28px 24px;
      margin-bottom: 20px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .app-name {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-name .icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .app1 .icon { background: #eef4ff; }
    .app2 .icon { background: #fff4ec; }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 4px;
    }

    .tab {
      padding: 6px 14px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: 'Figtree', sans-serif;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .tab.active {
      background: #fff;
      color: #111;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      border: 1.5px solid #efefef;
      border-radius: 12px;
      padding: 18px 16px 16px;
    }

    .card-label {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      color: #111;
      line-height: 1;
    }

    .card.ctr .card-value { color: #2563eb; }

    /* BARS */
    .bar-block { margin-bottom: 9px; }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      margin-bottom: 5px;
    }

    .bar-meta span:last-child { font-weight: 600; color: #111; }

    .bar-track {
      height: 8px;
      background: #f0f0f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
    .bar-fill.shows  { background: #111; }
    .bar-fill.clicks { background: #2563eb; }

    .updated {
      font-size: 12px;
      color: #ccc;
      margin-top: 16px;
    }

    @media (max-width: 520px) {
      .cards { grid-template-columns: 1fr; }
      .app-block { padding: 20px 16px; }
      .app-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-title">Banner Analytics</div>

  <!-- =====================================================
       ✏️  CHANGE VALUES HERE
  ====================================================== -->
  <script>
    const APPS = [
      {
        name: "Muslim UZ: Qur'on Azon Namoz",
        icon: "🕌",
        lastUpdated: "17 Mar 2026",
        stats: {
          daily:   { shows: 34295,   clicks: 122 * 3  },
          weekly:  { shows: 91074,  clicks: 412 * 3 },
          monthly: { shows: 168098, clicks: 647 * 3 }
        }
      },
      {
        name: "Yo'l harakati qoidalari 2026",
        icon: "🚗",
        lastUpdated: "17 Mar 2026",
        stats: {
          daily:   { shows: 43532,  clicks: 234 * 3  },
          weekly:  { shows: 187646, clicks: 741 * 3 },
          monthly: { shows: 287446, clicks: 1200 * 3 }
        }
      }
    ];
  </script>
  <!-- ===================================================== -->

  <div id="app-blocks"></div>

</div>

<script>
  const PERIODS = [
    { key: "daily",   label: "Yesterday"   },
    { key: "weekly",  label: "Last week"  },
    { key: "monthly", label: "This month" }
  ];

  // Active period per app
  const activePeriod = ["daily", "daily"];

  function ctr(shows, clicks) {
    return shows > 0 ? ((clicks / shows) * 100).toFixed(1) + "%" : "N/A";
  }

  function renderApp(app, appIdx) {
    const period = activePeriod[appIdx];
    const s = app.stats[period];
    const pct = s.shows > 0 ? (s.clicks / s.shows) * 100 : 0;
    const cls = appIdx === 0 ? "app1" : "app2";

    const tabsHtml = PERIODS.map(p => `
      <button class="tab ${p.key === period ? "active" : ""}"
        onclick="switchPeriod(${appIdx}, '${p.key}')">${p.label}</button>
    `).join("");

    return `
      <div class="app-block ${cls}">
        <div class="app-header">
          <div class="app-name">
            <div class="icon">${app.icon}</div>
            <span>${app.name}</span>
          </div>
          <div class="tabs">${tabsHtml}</div>
        </div>
        <div class="cards">
          <div class="card">
            <div class="card-label">Shows</div>
            <div class="card-value" id="shows-${appIdx}">${s.shows.toLocaleString()}</div>
          </div>
          <div class="card">
            <div class="card-label">Clicks</div>
            <div class="card-value" id="clicks-${appIdx}">${s.clicks.toLocaleString()}</div>
          </div>
          <div class="card ctr">
            <div class="card-label">CTR</div>
            <div class="card-value" id="ctr-${appIdx}">${ctr(s.shows, s.clicks)}</div>
          </div>
        </div>
        <div class="bar-block">
          <div class="bar-meta"><span>Shows</span><span id="sb-${appIdx}">${s.shows.toLocaleString()}</span></div>
          <div class="bar-track"><div class="bar-fill shows" style="width:100%"></div></div>
        </div>
        <div class="bar-block">
          <div class="bar-meta"><span>Clicks</span><span id="cb-${appIdx}">${s.clicks.toLocaleString()}</span></div>
          <div class="bar-track"><div class="bar-fill clicks" id="fill-${appIdx}" style="width:${pct}%"></div></div>
        </div>
        <div class="updated">Last updated: ${app.lastUpdated}</div>
      </div>
    `;
  }

  function render() {
    document.getElementById("app-blocks").innerHTML =
      APPS.map((app, i) => renderApp(app, i)).join("");
  }

  function switchPeriod(appIdx, period) {
    activePeriod[appIdx] = period;
    render();
  }

  render();
</script>
</body>
</html>
